<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grid Monument — ORE REALMS</title>
<link rel="stylesheet" href="css/hud.css?v=2">
<style>
  body { background: transparent; }
  body.solid-bg { background: var(--bg-obsidian); padding: 14px; overflow: auto; }

  .wrap {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
  }

  .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .top .title {
    font-family: var(--font-display);
    color: var(--accent-orange);
    text-shadow: var(--glow-orange);
    font-size: 16px;
    letter-spacing: 0.1em;
  }
  .top .meta {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .top .meta strong { color: var(--accent-orange); }

  .header-stats {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .header-stats .stat {
    flex: 1;
    background: #14100d;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 5px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header-stats .stat .lbl { font-size: 9px; }
  .header-stats .stat .val {
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--accent-orange);
    text-shadow: var(--glow-orange);
    letter-spacing: 0.04em;
  }
  .header-stats .stat .val.gold { color: var(--accent-gold); text-shadow: var(--glow-gold); }
  .header-stats .stat .val.urgent { color: var(--accent-red); animation: pulse-urgent 1s ease-in-out infinite; }

  .timer-row { margin-bottom: 10px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #14100d;
    border: 1px solid #2a221c;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: box-shadow 0.4s ease, background 0.4s ease, border-color 0.4s ease;
  }
  .cell .idx {
    position: absolute;
    top: 3px;
    left: 5px;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    z-index: 2;
  }
  .cell .sol {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 900;
    color: var(--accent-orange);
    text-shadow: var(--glow-orange);
    z-index: 2;
  }
  .cell .lbl {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 2;
  }
  .cell.empty .sol { color: var(--text-faint); text-shadow: none; }

  /* SOL fill bar at bottom of each cell */
  .cell .fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: linear-gradient(180deg, rgba(255,140,66,0.0) 0%, rgba(255,140,66,0.35) 70%, rgba(255,210,74,0.55) 100%);
    transition: height 0.5s ease;
    z-index: 1;
    pointer-events: none;
  }

  /* Leader badge on cell with the highest SOL this round */
  .cell .leader-badge {
    position: absolute;
    top: 2px;
    right: 3px;
    background: var(--accent-gold);
    color: #1a0e06;
    font-size: 8px;
    font-weight: bold;
    padding: 1px 4px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    display: none;
    z-index: 3;
    box-shadow: 0 0 6px rgba(255,210,74,0.7);
  }
  .cell.leader .leader-badge { display: block; }
  .cell.leader { border-color: var(--accent-gold); }
  .cell.leader .fill {
    background: linear-gradient(180deg, rgba(255,210,74,0.0) 0%, rgba(255,210,74,0.4) 70%, rgba(255,210,74,0.7) 100%);
  }

  .cell.winner {
    background: radial-gradient(circle at center, rgba(255,210,74,0.6), rgba(255,140,66,0.2) 70%, transparent);
    border-color: var(--accent-gold);
    animation: winner-pulse 0.9s ease-in-out infinite;
  }
  .cell.winner .sol { color: var(--accent-gold); text-shadow: var(--glow-gold); }
  @keyframes winner-pulse {
    0%,100% { box-shadow: 0 0 14px var(--accent-gold), 0 0 26px rgba(255,210,74,0.4); }
    50%     { box-shadow: 0 0 26px var(--accent-gold), 0 0 50px rgba(255,210,74,0.7); }
  }

  .cell.motherlode {
    animation: motherlode-pulse 0.8s linear infinite;
    border-color: var(--accent-gold);
  }
  .cell.motherlode .sol { color: white; }
  @keyframes motherlode-pulse {
    0%   { background: #ff3a3a; }
    20%  { background: #ff8c42; }
    40%  { background: #ffd24a; }
    60%  { background: #4aff8a; }
    80%  { background: #42a8ff; }
    100% { background: #b347ff; }
  }

  /* CSS-only confetti burst — appended to the cell when a winner is revealed */
  .confetti-burst {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
    z-index: 10;
  }
  .confetti-burst .piece {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 1px;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: confetti-fly 1.4s ease-out forwards;
  }
  @keyframes confetti-fly {
    0%   { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(0.4); }
  }

  .legend {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .legend .src .status-dot { vertical-align: middle; margin-right: 4px; }
  .legend .src .src-name { text-transform: uppercase; letter-spacing: 0.1em; }
  .src-name.live { color: var(--accent-green); }
  .src-name.rpc { color: var(--accent-orange); }
  .src-name.simulated { color: var(--accent-yellow); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">GRID MONUMENT</div>
    <div class="meta">Round <strong id="g-round">—</strong> &middot; <strong id="g-timer">--:--</strong></div>
  </div>

  <div class="header-stats">
    <div class="stat">
      <div class="lbl">Pool</div>
      <div class="val" id="hs-total">0.00 SOL</div>
    </div>
    <div class="stat">
      <div class="lbl">ORE / Round</div>
      <div class="val gold" id="hs-ore">~1.00</div>
    </div>
    <div class="stat">
      <div class="lbl">Next Round</div>
      <div class="val" id="hs-next">--:--</div>
    </div>
  </div>

  <div class="timer-row">
    <div class="timer-bar"><div class="timer-bar-fill" id="g-bar" style="width:0%"></div></div>
  </div>

  <div class="grid" id="g-grid"></div>

  <div class="legend">
    <div>Leader: <strong class="text-gold" id="g-leader">—</strong></div>
    <div class="src">
      <span class="status-dot offline" id="g-dot"></span>
      <span id="g-src" class="src-name">offline</span>
    </div>
  </div>
</div>

<div id="pb-debug"></div>

<script src="js/portals-bridge.js?v=2"></script>
<script src="js/ore-decode.js?v=2"></script>
<script src="js/solana.js?v=2"></script>
<script src="js/ore-client.js?v=2"></script>
<script>
  if (location.search.indexOf('debug=1') !== -1) document.body.classList.add('debug');
  if (location.search.indexOf('solid=1') !== -1) document.body.classList.add('solid-bg');

  var ROUND_LENGTH = 60;
  // Per ore-protocol.md: ≈1 ORE/min issuance to the winning square (split by stake).
  var ORE_PER_ROUND = 1.0;

  var CONFETTI_COLORS = ['#ffd24a', '#ff8c42', '#4aff8a', '#42a8ff', '#b347ff', '#ff3a3a'];

  // Build 25 cells
  var gridEl = document.getElementById('g-grid');
  var cellEls = [];
  for (var i = 0; i < 25; i++) {
    var c = document.createElement('div');
    c.className = 'cell empty';
    c.dataset.idx = String(i);
    c.innerHTML =
      '<div class="fill"></div>' +
      '<div class="leader-badge">LEAD</div>' +
      '<div class="idx">' + (i + 1) + '</div>' +
      '<div class="sol">0.00</div>' +
      '<div class="lbl">SOL</div>';
    gridEl.appendChild(c);
    cellEls.push(c);
  }

  var elRound  = document.getElementById('g-round');
  var elTimer  = document.getElementById('g-timer');
  var elBar    = document.getElementById('g-bar');
  var elTotal  = document.getElementById('hs-total');
  var elOreR   = document.getElementById('hs-ore');
  var elNext   = document.getElementById('hs-next');
  var elLeader = document.getElementById('g-leader');
  var elSrc    = document.getElementById('g-src');
  var elDot    = document.getElementById('g-dot');

  var state = {
    round: null,
    winnerCell: null,
    motherlode: false,
    lastReportedRound: -1,
    lastReportedWinner: -1
  };

  function fmtTime(sec) {
    sec = Math.max(0, Math.floor(sec));
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function updateGrid(values) {
    var total = 0;
    var max = 0;
    var maxIdx = -1;
    for (var i = 0; i < values.length; i++) {
      total += values[i];
      if (values[i] > max) { max = values[i]; maxIdx = i; }
    }
    for (var j = 0; j < 25; j++) {
      var v = values[j] || 0;
      var solEl = cellEls[j].querySelector('.sol');
      var fillEl = cellEls[j].querySelector('.fill');
      solEl.textContent = v.toFixed(2);
      cellEls[j].classList.toggle('empty', v < 0.001);
      // Fill bar proportional to share of total pool (not max — more meaningful)
      var share = total > 0 ? (v / total) : 0;
      fillEl.style.height = (Math.min(1, share * 4) * 100).toFixed(1) + '%';
      // Glow proportional to share of max
      var intensity = max > 0 ? (v / max) : 0;
      var glow = Math.round(intensity * 22);
      cellEls[j].style.boxShadow = intensity > 0.05
        ? '0 0 ' + glow + 'px rgba(255,140,66,' + (0.3 + intensity * 0.6).toFixed(2) + ')'
        : 'none';
      cellEls[j].classList.toggle('leader', j === maxIdx && v > 0.001);
    }
    elTotal.textContent = total.toFixed(2) + ' SOL';
    elLeader.textContent = (maxIdx >= 0 && max > 0.001) ? ('Cell ' + (maxIdx + 1) + ' (' + max.toFixed(2) + ')') : '—';
  }

  function applyWinnerStyling() {
    cellEls.forEach(function (c, i) {
      c.classList.remove('winner', 'motherlode');
      if (state.winnerCell && (i + 1) === state.winnerCell) {
        if (state.motherlode) c.classList.add('motherlode');
        else c.classList.add('winner');
        fireConfetti(c);
      }
    });
  }

  function fireConfetti(cellEl) {
    // Pure-CSS confetti — 18 pieces flying out from cell center.
    var old = cellEl.querySelector('.confetti-burst');
    if (old) old.remove();
    var burst = document.createElement('div');
    burst.className = 'confetti-burst';
    for (var k = 0; k < 18; k++) {
      var p = document.createElement('span');
      p.className = 'piece';
      var angle = Math.random() * Math.PI * 2;
      var dist = 30 + Math.random() * 50;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist;
      var rot = (Math.random() * 720 - 360) + 'deg';
      var color = CONFETTI_COLORS[k % CONFETTI_COLORS.length];
      p.style.background = color;
      p.style.setProperty('--dx', dx.toFixed(1) + 'px');
      p.style.setProperty('--dy', dy.toFixed(1) + 'px');
      p.style.setProperty('--rot', rot);
      p.style.animationDelay = (Math.random() * 0.15).toFixed(2) + 's';
      burst.appendChild(p);
    }
    cellEl.appendChild(burst);
    // Clean up after animation
    setTimeout(function () { try { burst.remove(); } catch (e) {} }, 1800);
  }

  function resetVisualForNewRound() {
    state.winnerCell = null;
    state.motherlode = false;
    cellEls.forEach(function (c) {
      c.classList.remove('winner', 'motherlode', 'leader');
      c.style.boxShadow = 'none';
      var b = c.querySelector('.confetti-burst');
      if (b) b.remove();
    });
  }

  function setSource(src) {
    var name = src || 'offline';
    elSrc.textContent = name;
    elSrc.className = 'src-name ' + name;
    elDot.className = 'status-dot ' +
      (src === 'live' || src === 'rpc' ? 'connected' : src === 'simulated' ? 'simulated' : 'offline');
  }

  // -------- ORE client wiring --------
  OreClient.startPolling({
    onGrid: function (cells) {
      updateGrid(cells);
    },
    onRound: function (n) {
      if (state.lastReportedRound !== -1 && n !== state.lastReportedRound) {
        resetVisualForNewRound();
        PortalsBridge.activateTask('Round_Reset');
        PortalsBridge.debugLog('round transition ' + state.lastReportedRound + ' -> ' + n + ' (sent Round_Reset)');
      }
      state.lastReportedRound = n;
      state.round = n;
      elRound.textContent = '#' + n;
    },
    onTimer: function (sec) {
      elTimer.textContent = fmtTime(sec);
      elNext.textContent = fmtTime(sec);
      var pct = Math.max(0, Math.min(100, (sec / ROUND_LENGTH) * 100));
      elBar.style.width = pct + '%';
      var urgent = sec <= 10 && sec > 0;
      elBar.classList.toggle('urgent', urgent);
      // also tint header next-timer red in last 10s
      var nextEl = document.getElementById('hs-next');
      if (urgent) nextEl.classList.add('urgent'); else nextEl.classList.remove('urgent');
    },
    onWinner: function (idx, motherlode) {
      var sig = (state.round || 0) * 100 + idx;
      if (state.lastReportedWinner === sig) return;
      state.lastReportedWinner = sig;

      state.winnerCell = idx;
      state.motherlode = !!motherlode;
      applyWinnerStyling();

      var taskName = 'Round_Reveal_Cell_' + idx;
      PortalsBridge.activateTask(taskName);
      if (motherlode) PortalsBridge.activateTask('Motherlode_Burst');
      PortalsBridge.debugLog('winner ' + idx + (motherlode ? ' MOTHERLODE' : '') + ' -> activated ' + taskName);
    },
    onSource: setSource
  });

  // Listen for any direct grid pushes from Portals as well.
  PortalsBridge.onMessage(function (m) {
    if (m.type === 'grid' && m.payload && m.payload.length >= 25) {
      var values = m.payload.slice(0, 25).map(function (v) { return Number(v) || 0; });
      updateGrid(values);
    }
    if (m.type === 'winner' && m.payload && m.payload[0] != null) {
      var idx = Number(m.payload[0]);
      var ml = (m.payload[1] != null) ? !!Number(m.payload[1]) : false;
      state.winnerCell = idx;
      state.motherlode = ml;
      applyWinnerStyling();
    }
    if (m.type === 'motherlode' && m.payload && m.payload[0]) {
      state.motherlode = !!Number(m.payload[0]);
      applyWinnerStyling();
    }
    if (m.type === 'round' && m.payload && m.payload[0]) {
      elRound.textContent = '#' + Number(m.payload[0]);
    }
  });

  // Static: show ORE/round (this is a protocol constant).
  elOreR.textContent = '~' + ORE_PER_ROUND.toFixed(2);
</script>
</body>
</html>
